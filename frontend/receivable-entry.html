<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>บันทึกลูกหนี้</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h3>หน้าบันทึกข้อมูลลูกหนี้</h3><form id="f"><label>วันที่</label><input type="date" name="entry_date" required><label>ผู้บันทึก</label><input name="submitted_by" required><label>ชื่อลูกค้า</label><input name="customer_name" required><label>เลขที่บิล</label><input name="bill_no" required><label>ยอดเครดิต</label><input type="number" step="0.01" name="credit_amount" required><label>ชำระแล้ว</label><input type="number" step="0.01" name="paid_amount" value="0"><label>ครบกำหนด</label><input type="date" name="due_date" required><label>หมายเหตุ</label><textarea name="note" id="note"></textarea><button type="submit">บันทึก</button></form></div></div><script src="config.js"></script><script src="api.js"></script><script src="app.js"></script><script>requireSession(['employee','owner']);document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();const bill=document.querySelector('[name=bill_no]').value.trim();const note=document.getElementById('note').value.trim();await submitForm('createReceivable','f',{note:`เลขที่บิล: ${bill}${note?` | ${note}`:''}`});});</script></body></html>
