<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>บันทึกยอดขาย</title><link rel="stylesheet" href="styles.css"></head>
<body><div class="container"><div class="card"><h3>หน้าบันทึกข้อมูลยอดขาย</h3><form id="f"><label>วันที่</label><input type="date" name="entry_date" required><label>ผู้บันทึก</label><input name="submitted_by" required><label>เงินสด</label><input type="number" step="0.01" name="cash_amount" required><label>โอน</label><input type="number" step="0.01" name="transfer_amount" required><label>เครดิต</label><input type="number" step="0.01" name="credit_amount" required><label>ยอดขายรวม</label><input type="number" step="0.01" name="total_sales" required><label>เงินคงเหลือในลิ้นชัก (ยอดคงที่รายวัน)</label><input type="number" step="0.01" name="drawer_balance" required><label>หมายเหตุ</label><textarea name="note"></textarea><button type="submit">บันทึก</button></form></div></div><script src="config.js"></script><script src="api.js"></script><script src="app.js"></script><script>requireSession(['employee','owner']);document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();await submitForm('createDailySales','f');});</script></body></html>
