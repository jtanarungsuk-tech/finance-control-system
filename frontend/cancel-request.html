<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>รายการยกเลิกบิล</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h3>หน้าบันทึกข้อมูลรายการยกเลิกบิล</h3><form id="f"><label>วันที่</label><input type="date" name="entry_date" required><label>ผู้บันทึก</label><input name="submitted_by" required><label>เลขที่บิล</label><input name="bill_no" required><label>ยอดยกเลิก</label><input type="number" step="0.01" name="cancel_amount" required><label>เหตุผล</label><input name="reason" required><label>รายละเอียด</label><textarea name="detail" id="detail"></textarea><button type="submit" class="warning">ส่งคำขอ</button></form></div></div><script src="config.js"></script><script src="api.js"></script><script src="app.js"></script><script>requireSession(['employee','owner']);document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();const bill=document.querySelector('[name=bill_no]').value.trim();const detail=document.getElementById('detail').value.trim();await submitForm('createCancelRequest','f',{detail:`เลขที่บิล: ${bill}${detail?` | ${detail}`:''}`});});</script></body></html>
