<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>อนุมัติยกเลิกบิล</title><link rel="stylesheet" href="styles.css"></head><body>
<div class="container"><div class="card"><h3>หน้าจัดการยกเลิกบิล</h3><div class="table-wrap"><table><thead><tr><th>ID</th><th>วันที่</th><th>สาขา</th><th>จำนวน</th><th>เหตุผล</th><th>สถานะ</th><th>จัดการ</th></tr></thead><tbody id="tb"></tbody></table></div></div></div>
<script src="config.js"></script><script src="api.js"></script><script src="app.js"></script>
<script>
(function forceOwner(){
  const s=getSession();
  if(!s || s.role!=='owner') localStorage.setItem('fcs_session', JSON.stringify({email:'owner@local',role:'owner',branch:'MAIN'}));
})();
async function load(){
  const s=requireSession(['owner']); if(!s) return;
  const rows=await API.get('getPendingCancelRequests',{role:s.role,user:s.email});
  const tb=document.getElementById('tb'); tb.innerHTML='';
  rows.forEach(r=>{
    const id = r.record_id || r[0];
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${id}</td><td>${r.entry_date||r[4]}</td><td>${r.branch||r[5]}</td><td>${thb(r.cancel_amount||r[6])}</td><td>${r.reason||r[7]}</td><td class="status-pending">${r.approval_status||r[10]}</td><td><button class="approve-btn" data-id="${id}">อนุมัติ</button><button class='danger reject-btn' data-id="${id}">ปฏิเสธ</button></td>`;
    tb.appendChild(tr);
  });

  tb.querySelectorAll('.approve-btn').forEach(btn => btn.addEventListener('click', () => act(btn.dataset.id, 'approveCancelRequest')));
  tb.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', () => act(btn.dataset.id, 'rejectCancelRequest')));
}
async function act(id,action){
  const s=getSession();
  await API.post(action,{record_id:id,role:s.role,user:s.email});
  await load();
}
load();
</script></body></html>
