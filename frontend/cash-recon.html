<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>กระทบยอดเงินสด</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h3>หน้าบันทึกข้อมูลกระทบยอดเงินสด</h3><form id="f"><label>วันที่</label><input type="date" name="entry_date" id="entry_date" required><label>ผู้บันทึก</label><input name="submitted_by" required><label>เงินสดควรเหลือ (คำนวณอัตโนมัติ)</label><input type="number" step="0.01" name="expected_cash" id="expected_cash" readonly><label>เงินสดนับจริง</label><input type="number" step="0.01" name="actual_cash" id="actual_cash" required><label>ผลต่าง (คำนวณอัตโนมัติ)</label><input type="number" step="0.01" name="difference" id="difference" readonly><label>สถานะ</label><input name="recon_status_label" id="recon_status_label" readonly><input type="hidden" name="recon_status" id="recon_status"><label>สาเหตุผลต่าง</label><select name="difference_reason" id="difference_reason"><option value="">-- เลือกสาเหตุ --</option><option>เงินทอนลูกค้า</option><option>เศษเหรียญ</option><option>นับผิด</option><option>ค่าใช้จ่ายยังไม่บันทึก</option><option>ฝากเงินยังไม่บันทึก</option><option>เอกสารไม่ครบ</option><option>อื่นๆ</option></select><p class="small" id="reason_hint">บังคับกรอกเมื่อผลต่างไม่เท่ากับ 0</p><label>หมายเหตุ</label><textarea name="note" placeholder="เช่น พบเหรียญขาด 20 บาท / รอใบเสร็จค่าใช้จ่าย"></textarea><button type="submit">บันทึกกระทบยอด</button></form></div><div class="card" id="display"><h3>สรุปกระทบยอดเงินสด</h3><div class="grid"><div><div class="small">เงินสดควรเหลือ</div><div class="kpi" id="v_expected">฿0.00</div></div><div><div class="small">เงินสดนับจริง</div><div class="kpi" id="v_actual">฿0.00</div></div><div><div class="small">ผลต่าง</div><div class="kpi" id="v_diff">฿0.00</div></div><div><div class="small">สถานะ</div><div class="kpi" id="v_status">ตรงยอด</div></div></div></div></div><script src="config.js"></script><script src="api.js"></script><script src="app.js"></script><script>
const statusMeta = { MATCHED: {label:'ตรงยอด',cls:'ok'}, SHORT: {label:'เงินขาด',cls:'bad'}, OVER: {label:'เงินเกิน',cls:'warn'} };
function getStatus(diff){if(diff===0)return 'MATCHED';if(diff<0)return 'SHORT';return 'OVER';}
function paintStatus(diff){const st=getStatus(diff), meta=statusMeta[st];document.getElementById('recon_status').value=st;document.getElementById('recon_status_label').value=meta.label;const statusEl=document.getElementById('v_status');statusEl.className='kpi '+meta.cls;statusEl.textContent=meta.label;const diffEl=document.getElementById('v_diff');diffEl.className='kpi '+meta.cls;const req=diff!==0;document.getElementById('difference_reason').required=req;document.getElementById('reason_hint').textContent=req?'ต้องเลือกสาเหตุผลต่าง':'ไม่ต้องเลือกสาเหตุเมื่อยอดตรง';}
async function refreshExpected(){const s=requireSession(['employee','owner']);if(!s)return;const date=document.getElementById('entry_date').value||todayStr();const d=await API.get('getEmployeeDailyDashboard',{role:s.role,user:s.email,branch:s.branch,date});const expected=Number(d.totals.expected_cash||0);document.getElementById('expected_cash').value=expected.toFixed(2);document.getElementById('v_expected').textContent=thb(expected);recalc();}
function recalc(){const expected=Number(document.getElementById('expected_cash').value||0);const actual=Number(document.getElementById('actual_cash').value||0);const diff=actual-expected;document.getElementById('difference').value=diff.toFixed(2);document.getElementById('v_actual').textContent=thb(actual);document.getElementById('v_diff').textContent=thb(diff);paintStatus(diff);}
requireSession(['employee','owner']);document.getElementById('entry_date').value=todayStr();document.getElementById('entry_date').addEventListener('change', refreshExpected);document.getElementById('actual_cash').addEventListener('input', recalc);document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();await submitForm('createCashRecon','f');await refreshExpected();});refreshExpected();
</script></body></html>
