<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>บันทึกฝากเงิน</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h3>หน้าบันทึกข้อมูลฝากเงิน</h3><form id="f"><label>วันที่</label><input type="date" name="entry_date" required><label>ผู้บันทึก</label><input name="submitted_by" required><label>ยอดฝาก</label><input type="number" step="0.01" name="deposit_amount" required><input type="hidden" name="cash_before_deposit" id="cash_before_deposit" value="0"><label>บัญชีธนาคาร</label><input name="bank_account" required><label>หมายเหตุ</label><textarea name="note"></textarea><button type="submit">บันทึก</button></form></div></div><script src="config.js"></script><script src="api.js"></script><script src="app.js"></script><script>requireSession(['employee','owner']);document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();const dep=Number(document.querySelector('[name=deposit_amount]').value||0);document.getElementById('cash_before_deposit').value=dep;await submitForm('createDeposit','f');});</script></body></html>
