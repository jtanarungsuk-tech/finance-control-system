<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>บันทึกค่าใช้จ่าย</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h3>หน้าบันทึกข้อมูลค่าใช้จ่าย</h3><form id="f"><label>วันที่</label><input type="date" name="entry_date" required><label>ผู้บันทึก</label><input name="submitted_by" required><label>ชื่อค่าใช้จ่าย</label><input name="expense_name" required><input type="hidden" name="category" value="ทั่วไป"><label>จำนวนเงิน</label><input type="number" step="0.01" name="amount" required><label>แหล่งจ่ายเงิน</label><select name="payment_source"><option value="cash">เงินสด</option><option value="bank">ธนาคาร</option></select><label>หมายเหตุ</label><textarea name="note"></textarea><button type="submit">บันทึก</button></form></div></div><script src="config.js"></script><script src="api.js"></script><script src="app.js"></script><script>requireSession(['employee','owner']);document.getElementById('f').addEventListener('submit',async e=>{e.preventDefault();await submitForm('createExpense','f');});</script></body></html>
